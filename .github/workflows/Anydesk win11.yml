name: "PC Setup Workflow"

on:
  workflow_dispatch:

jobs:
  pc-setup:
    runs-on: windows-2022
    steps:
      - name: 1. Official AnyDesk Installation & Logic
        shell: cmd
        run: |
          echo [INFO] Downloading Official AnyDesk.exe...
          powershell -Command "Invoke-WebRequest -Uri 'https://download.anydesk.com/AnyDesk.exe' -OutFile 'AnyDesk.exe'"
          
          echo [INFO] Installing AnyDesk Silently...
          AnyDesk.exe --install "C:\AnyDesk" --start-with-win --silent
          
          echo [INFO] Waiting 20s for installation...
          powershell -Command "Start-Sleep -Seconds 20"
          
          set "adPath=C:\AnyDesk\AnyDesk.exe"

          if not exist "%adPath%" (
              echo [ERROR] AnyDesk was not found!
              exit 1
          )

          :START_ANYDESK
          echo [INFO] Starting AnyDesk service in background...
          start "" "%adPath%" --start
          powershell -Command "Start-Sleep -Seconds 10"

          echo [INFO] Attempting to fetch AnyDesk ID...
          for /f "delims=" %%i in ('"%adPath%" --get-id') do (
              set "ID=%%i"
          )

          if "%ID%"=="" (
              echo [WARNING] ID is empty, retrying...
              taskkill /f /im anydesk.exe > nul 2>&1
              goto START_ANYDESK
          )
          if "%ID%"=="0" (
              echo [WARNING] ID is 0, retrying...
              taskkill /f /im anydesk.exe > nul 2>&1
              goto START_ANYDESK
          )
          
          echo [SUCCESS] Valid ID found: %ID%
          echo [INFO] Setting password for Full Access...
          echo MR.English2008 | "%adPath%" --set-password _full_access
          
          echo ANYDESK_ID=%ID% >> %GITHUB_ENV%

      - name: 2. System Tweaks (Dark Mode, Wallpaper)
        shell: powershell
        run: |
          Write-Host "[*] Enabling Dark Mode..."
          $RegistryPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize"
          if (!(Test-Path $RegistryPath)) { New-Item -Path $RegistryPath -Force }
          Set-ItemProperty -Path $RegistryPath -Name "AppsUseLightTheme" -Value 0
          Set-ItemProperty -Path $RegistryPath -Name "SystemUsesLightTheme" -Value 0

          Write-Host "[*] Downloading and setting Wallpaper..."
          python -m pip install gdown
          $wallpaperPath = "C:\Users\Public\wallpaper.jpg"
          
          gdown "1CqDRrlR_e1U0hkxEW2_iLB4c5n8SgcbC" -O $wallpaperPath
          
          if (Test-Path $wallpaperPath) {
              $code = 'using System.Runtime.InteropServices; public class Wallpaper { [DllImport("user32.dll", CharSet = CharSet.Auto)] public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni); }'
              Add-Type -TypeDefinition $code
              [Wallpaper]::SystemParametersInfo(0x0014, 0, $wallpaperPath, 0x01 -bor 0x02)
              Write-Host "[+] Wallpaper set successfully."
          } else {
              Write-Host "[!] Failed to download wallpaper. Moving on..."
              $global:LASTEXITCODE = 0
          }

      - name: 3. Download and Prepare Files (Vegas, Bandicam, Virtual Audio Cable, StartIsBack)
        shell: powershell
        run: |
          $desktopPath = "C:\Users\Public\Desktop\VegasInstaller"
          if (!(Test-Path $desktopPath)) { New-Item -ItemType Directory -Path $desktopPath }

          Write-Host "[*] Installing 7-Zip..."
          choco install 7zip -y

          Write-Host "[*] Downloading Vegas Pro 17..."
          gdown "1XM6yq7ujk4QacXEYXoWqFrekpvY13Bpq" -O "vegas.rar"
          
          if (Test-Path "vegas.rar") {
              & "C:\Program Files\7-Zip\7z.exe" x "vegas.rar" -o"$desktopPath" -p"taiwebs.com" -y
          } else {
              Write-Host "[!] Vegas RAR not found."
              $global:LASTEXITCODE = 0
          }

          Write-Host "[*] Downloading Bandicam..."
          Invoke-WebRequest -Uri "https://dl.bandicam.com/bdcamsetup.exe" -OutFile "$desktopPath\bdcamsetup.exe"

          Write-Host "[*] Downloading StartIsBack Setup..."
          Invoke-WebRequest -Uri "https://startisback.sfo3.cdn.digitaloceanspaces.com/StartIsBackPlusPlus_setup.exe" -OutFile "$desktopPath\StartIsBackPlusPlus_setup.exe"

          Write-Host "[*] Downloading Virtual Audio Cable (VAC)..."
          Invoke-WebRequest -Uri "https://software.muzychenko.net/trials/vac470.exe" -OutFile "$desktopPath\vac470.exe"

          Write-Host "[+] All files ready in VegasInstaller folder on the desktop!"

      - name: 4. Final Status & Keep Alive
        shell: powershell
        run: |
          $endTime = (Get-Date).AddHours(6)
          Write-Host "========================================"
          Write-Host "PC SETUP READY"
          Write-Host "ANYDESK ID: $env:ANYDESK_ID"
          Write-Host "Password: MR.English2008"
          Write-Host "Dark Mode Enabled | Required Files on Desktop"
          Write-Host "========================================"
          
          while ((Get-Date) -lt $endTime) {
              Write-Host "Online | ID: $env:ANYDESK_ID | $(Get-Date)"
              Start-Sleep -Seconds 300
          }
          
