name: "Windows Server 2025 Workspace (CMD + PowerShell Loop)"

on: workflow_dispatch

jobs:
  setup-workspace:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: 🧑 Create User and Configure Groups
        shell: cmd
        run: |
          echo 🔧 Initializing Windows Server 2022 Workspace...
          echo 👤 Creating local user 'User'...
          net user User act1-1234 /add
          echo ✅ User 'User' created.

          echo 🔐 Adding 'User' to Administrators group...
          net localgroup Administrators User /add
          echo ✅ User added to Administrators.

          echo 🔐 Adding 'User' to Remote Desktop Users group...
          net localgroup "Remote Desktop Users" User /add
          echo ✅ User added to Remote Desktop Users.

      - name: 🎵 Configure Audio Service
        shell: cmd
        run: |
          echo 🔊 Configuring Windows Audio service to start automatically...
          echo ✅ Audio service configured and started.

      - name: 🌐 Install and Configure Tailscale
        shell: cmd
        run: |
          echo 🔧 Downloading Tailscale installer...
          powershell -Command "Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe' -OutFile '%USERPROFILE%\tailscale-setup.exe'"

          echo 💻 Installing Tailscale silently...
          "%USERPROFILE%\tailscale-setup.exe" /quiet

          echo ⏳ Waiting 20 seconds for Tailscale services to initialize...
          powershell -Command "Start-Sleep -Seconds 20"

          echo 🔍 Detecting installed Tailscale path...
          if exist "%ProgramFiles%\Tailscale\tailscale.exe" (
              set "TAILSCALE_PATH=%ProgramFiles%\Tailscale\tailscale.exe"
          ) else if exist "%ProgramFiles(x86)%\Tailscale\tailscale.exe" (
              set "TAILSCALE_PATH=%ProgramFiles(x86)%\Tailscale\tailscale.exe"
          ) else (
              echo ❌ Tailscale executable not found!
              exit /b 1
          )

          echo 🔗 Starting Tailscale for secure remote access...
          "%TAILSCALE_PATH%" up --hostname=windows2022-workspace
          echo ✅ Tailscale is running.

      - name: 💬 Display Workspace Info
        shell: cmd
        run: |
          echo ===============================================
          echo 🏢 Windows Server 2022 Workspace Ready
          echo -----------------------------------------------
          echo 💻 Login Information:
          echo     Username: User
          echo     Password: act1-1234
          echo     RDP access enabled
          echo.
          echo 🌐 Tailscale hostname: windows2022-workspace
          echo -----------------------------------------------
          echo 🌟🐻🧸 MADE BY DANIEL 64. DM IN TELEGRAM @daniel64idk IF SOMETHING IS WRONG OR NOT WORKING 
          echo ===============================================

      - name: 🎬 Download and Prepare Files (Vegas, Bandicam, StartIsBack)
        shell: powershell
        run: |
          Write-Host "[*] Installing dependencies (7-Zip and gdown)..."
          choco install 7zip -y
          python -m pip install gdown

          Write-Host "[*] Downloading Vegas Pro 17 from Google Drive..."
          gdown "1XM6yq7ujk4QacXEYXoWqFrekpvY13Bpq" -O "vegas.rar"

          Write-Host "[*] Extracting Vegas Pro directly to the Public Desktop..."
          & "C:\Program Files\7-Zip\7z.exe" x "vegas.rar" -o"C:\Users\Public\Desktop\VegasInstaller" -p"taiwebs.com" -y

          Write-Host "[*] Downloading Bandicam installer..."
          Invoke-WebRequest -Uri "https://dl.bandicam.com/bdcamsetup.exe" -OutFile "C:\Users\Public\Desktop\VegasInstaller\bdcamsetup.exe"
          
          Write-Host "[*] Downloading StartIsBack Setup..."
          Invoke-WebRequest -Uri "https://startisback.sfo3.cdn.digitaloceanspaces.com/StartIsBackPlusPlus_setup.exe" -OutFile "C:\Users\Public\Desktop\VegasInstaller\StartIsBackPlusPlus_setup.exe"

          Write-Host "[+] Vegas Pro 17, Bandicam, and StartIsBack are downloaded and waiting in the VegasInstaller folder on the desktop!"

      - name: ⏳ Display Minsk Time and Keep-Alive Loop
        shell: powershell
        run: |
          # Show Minsk timezone end time
          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById('FLE Standard Time')
          $endTime = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date).AddHours(6), $tz.Id)
          Write-Host "[*] Workspace will remain active until (Minsk time): $endTime"

          # Print Enjoy! once
          Write-Host "Enjoy!"

          # Infinite silent loop to keep workspace alive
          while ($true) {
              Start-Sleep -Seconds 10
          }
          
